name: Deploy VerCeel.tech

on:
  push:
    branches:
     - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Deploy to Digital Ocean VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
         host: ${{ secrets.VPS_IP_DIGITALOCEAN }}
         username: ${{ secrets.VPS_USER_DIGITALOCEAN }}
         key: ${{ secrets.SSH_PRIVATE_KEY_DIGITALOCEAN }}
         port: ${{ secrets.SSH_PORT }}
         script: |
          cd /var/www/projet-annuel-ESGI26
          git fetch origin main
          git pull origin main
          docker-compose down 
          docker-compose build
          docker-compose up -d
