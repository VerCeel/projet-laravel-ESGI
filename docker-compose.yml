services:
  postgres:
    image: postgres:16-alpine
    container_name: esgi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: backend
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d backend"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: esgi_backend
    working_dir: /var/www
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: backend
      DB_USERNAME: root
      DB_PASSWORD: root
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
    command: >
      sh -c "
      if [ ! -f .env ]; then cp .env.example .env; fi &&
      if [ ! -f vendor/autoload.php ]; then composer install; fi &&
      if ! grep -q '^APP_KEY=base64:' .env; then php artisan key:generate --force; fi &&
      php artisan migrate --force &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: esgi_frontend
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "
      if [ ! -d node_modules ] || [ -z \"$$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi &&
      npm run dev -- --host 0.0.0.0 --port 5173
      "

volumes:
  postgres_data:
  backend_vendor:
  frontend_node_modules:
